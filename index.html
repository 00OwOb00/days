<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rainy day</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #b8cfe0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  /* 雨滴 */
  .rain-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .raindrop {
    position: absolute;
    width: 1.5px;
    background: linear-gradient(to bottom, transparent, rgba(180,210,230,0.7));
    border-radius: 2px;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-40px); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* 主視窗框架 */
  .window-frame {
    position: relative;
    width: min(700px, 96vw);
    height: min(520px, 90vh);
    background: rgba(230,242,250,0.55);
    border: 2.5px solid rgba(180,210,230,0.7);
    border-radius: 18px;
    backdrop-filter: blur(6px);
    box-shadow: 0 8px 40px rgba(100,150,190,0.18);
    z-index: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 窗框頂部橫條 */
  .window-top {
    height: 32px;
    background: rgba(180,210,230,0.45);
    border-bottom: 1.5px solid rgba(180,210,230,0.5);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 7px;
    flex-shrink: 0;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #f2a49a; }
  .dot-y { background: #f5d07a; }
  .dot-g { background: #96d6a0; }

  /* 窗內場景 */
  .scene {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* 窗玻璃上的大雨滴 */
  .glass-drop {
    position: absolute;
    width: 2.5px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: rgba(200,225,245,0.55);
    animation: glass-fall linear infinite;
  }
  @keyframes glass-fall {
    0% { top: -10px; opacity: 0; }
    5% { opacity: 0.8; }
    85% { opacity: 0.5; }
    100% { top: 105%; opacity: 0; }
  }

  /* 遠景：天空漸層 */
  .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52%;
    background: linear-gradient(to bottom, #a8c8e0 0%, #c8dff0 60%, #daeaf6 100%);
  }

  /* 遠景：模糊建築輪廓 */
  .cityline {
    position: absolute;
    bottom: 48%;
    left: 0; right: 0;
    height: 60px;
    opacity: 0.22;
  }

  /* 地面 */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to bottom, #d8eaf5 0%, #c5d9ea 100%);
  }

  /* 書桌 */
  .desk {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 82%;
  }

  /* 檯燈光暈 */
  .lamp-glow {
    position: absolute;
    bottom: 88px;
    left: 17%;
    width: 120px;
    height: 70px;
    background: radial-gradient(ellipse at 50% 80%, rgba(255,240,180,0.0) 0%, rgba(255,240,180,0.0) 100%);
    border-radius: 50%;
    transition: background 1.5s ease;
    pointer-events: none;
  }
  .lamp-glow.on {
    background: radial-gradient(ellipse at 50% 80%, rgba(255,240,160,0.55) 0%, rgba(255,235,140,0.18) 60%, transparent 100%);
  }
</style>
</head>
<body>

<!-- 背景雨滴 -->
<div class="rain-container" id="rain"></div>

<!-- 主視窗 -->
<div class="window-frame">
  <div class="window-top">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
  </div>

  <div class="scene">
    <!-- 窗玻璃大雨滴 -->
    <div id="glass-rain"></div>

    <!-- 天空 -->
    <div class="sky"></div>

    <!-- 城市輪廓 SVG -->
    <svg class="cityline" viewBox="0 0 700 60" preserveAspectRatio="none">
      <rect x="30" y="20" width="18" height="40" fill="#7aa8c8"/>
      <rect x="52" y="8" width="14" height="52" fill="#7aa8c8"/>
      <rect x="70" y="26" width="22" height="34" fill="#7aa8c8"/>
      <rect x="96" y="14" width="16" height="46" fill="#7aa8c8"/>
      <rect x="116" y="30" width="20" height="30" fill="#7aa8c8"/>
      <rect x="140" y="6" width="12" height="54" fill="#7aa8c8"/>
      <rect x="156" y="18" width="18" height="42" fill="#7aa8c8"/>
      <rect x="178" y="24" width="14" height="36" fill="#7aa8c8"/>
      <rect x="200" y="10" width="20" height="50" fill="#7aa8c8"/>
      <rect x="224" y="32" width="16" height="28" fill="#7aa8c8"/>
      <rect x="250" y="16" width="22" height="44" fill="#7aa8c8"/>
      <rect x="280" y="4" width="14" height="56" fill="#7aa8c8"/>
      <rect x="300" y="22" width="18" height="38" fill="#7aa8c8"/>
      <rect x="340" y="12" width="16" height="48" fill="#7aa8c8"/>
      <rect x="362" y="28" width="20" height="32" fill="#7aa8c8"/>
      <rect x="390" y="8" width="14" height="52" fill="#7aa8c8"/>
      <rect x="410" y="20" width="22" height="40" fill="#7aa8c8"/>
      <rect x="440" y="14" width="16" height="46" fill="#7aa8c8"/>
      <rect x="462" y="30" width="18" height="30" fill="#7aa8c8"/>
      <rect x="486" y="6" width="12" height="54" fill="#7aa8c8"/>
      <rect x="504" y="24" width="20" height="36" fill="#7aa8c8"/>
      <rect x="530" y="18" width="14" height="42" fill="#7aa8c8"/>
      <rect x="550" y="10" width="22" height="50" fill="#7aa8c8"/>
      <rect x="580" y="26" width="16" height="34" fill="#7aa8c8"/>
      <rect x="602" y="14" width="18" height="46" fill="#7aa8c8"/>
      <rect x="626" y="4" width="14" height="56" fill="#7aa8c8"/>
      <rect x="646" y="22" width="20" height="38" fill="#7aa8c8"/>
      <rect x="672" y="16" width="16" height="44" fill="#7aa8c8"/>
    </svg>

    <!-- 地面 -->
    <div class="ground"></div>

    <!-- 檯燈光暈 -->
    <div class="lamp-glow" id="lampGlow"></div>

    <!-- 書桌場景 SVG -->
    <div class="desk">
      <svg viewBox="0 0 560 220" width="100%" xmlns="http://www.w3.org/2000/svg">

        <!-- 桌面 -->
        <rect x="0" y="140" width="560" height="18" rx="4" fill="#c8daea" stroke="#a8c0d4" stroke-width="1"/>
        <rect x="0" y="156" width="560" height="8" rx="2" fill="#b0cade"/>
        <!-- 桌腳 -->
        <rect x="30" y="164" width="14" height="50" rx="3" fill="#b0cade"/>
        <rect x="516" y="164" width="14" height="50" rx="3" fill="#b0cade"/>

        <!-- ── 檯燈 ── -->
        <!-- 燈座 -->
        <ellipse cx="105" cy="142" rx="18" ry="5" fill="#a8c0d4"/>
        <!-- 燈桿 -->
        <line x1="105" y1="137" x2="100" y2="100" stroke="#a8c0d4" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="100" y1="100" x2="112" y2="78" stroke="#a8c0d4" stroke-width="3.5" stroke-linecap="round"/>
        <!-- 燈罩 -->
        <path d="M96,78 Q112,68 128,78 L122,96 Q112,100 102,96 Z" fill="#e8d070" stroke="#c8b050" stroke-width="1.2"/>
        <!-- 燈泡光點 -->
        <circle cx="112" cy="88" r="4" fill="rgba(255,248,180,0.85)"/>

        <!-- ── 復古收音機 ── -->
        <!-- 機身 -->
        <rect x="200" y="105" width="80" height="38" rx="7" fill="#c8daea" stroke="#a8bece" stroke-width="1.2"/>
        <!-- 喇叭網格 -->
        <rect x="207" y="112" width="32" height="24" rx="3" fill="#b0c8dc" stroke="#98b8cc" stroke-width="0.8"/>
        <line x1="211" y1="116" x2="235" y2="116" stroke="#98b8cc" stroke-width="0.7"/>
        <line x1="211" y1="120" x2="235" y2="120" stroke="#98b8cc" stroke-width="0.7"/>
        <line x1="211" y1="124" x2="235" y2="124" stroke="#98b8cc" stroke-width="0.7"/>
        <line x1="211" y1="128" x2="235" y2="128" stroke="#98b8cc" stroke-width="0.7"/>
        <line x1="215" y1="112" x2="215" y2="136" stroke="#98b8cc" stroke-width="0.7"/>
        <line x1="221" y1="112" x2="221" y2="136" stroke="#98b8cc" stroke-width="0.7"/>
        <line x1="227" y1="112" x2="227" y2="136" stroke="#98b8cc" stroke-width="0.7"/>
        <!-- 調頻旋鈕 -->
        <circle cx="257" cy="119" r="7" fill="#d8e8f4" stroke="#a8bece" stroke-width="1"/>
        <circle cx="257" cy="119" r="3.5" fill="#b8d0e4"/>
        <!-- 電源旋鈕 -->
        <circle cx="272" cy="128" r="5" fill="#d8e8f4" stroke="#a8bece" stroke-width="1"/>
        <!-- 天線 -->
        <line x1="275" y1="105" x2="282" y2="78" stroke="#a8bece" stroke-width="1.8" stroke-linecap="round"/>
        <!-- 機底條紋 -->
        <rect x="200" y="136" width="80" height="5" rx="0" fill="#b8d0e4" opacity="0.5"/>

        <!-- ── 小書本堆 ── -->
        <rect x="330" y="122" width="44" height="10" rx="2" fill="#d4e8d8" stroke="#b0ccb8" stroke-width="0.8"/>
        <rect x="334" y="113" width="38" height="10" rx="2" fill="#e8d4d8" stroke="#ccb0b8" stroke-width="0.8"/>
        <rect x="332" y="104" width="42" height="10" rx="2" fill="#d8d4e8" stroke="#b8b0cc" stroke-width="0.8"/>

        <!-- ── 小咖啡杯 ── -->
        <path d="M430,130 Q428,142 432,142 L448,142 Q452,142 450,130 Z" fill="#e8ddd0" stroke="#c8b8a8" stroke-width="1"/>
        <ellipse cx="440" cy="130" rx="10" ry="3.5" fill="#d8ccc0" stroke="#c8b8a8" stroke-width="0.8"/>
        <path d="M450,133 Q458,133 458,138 Q458,143 450,143" fill="none" stroke="#c8b8a8" stroke-width="1.2"/>
        <ellipse cx="440" cy="143" rx="14" ry="3" fill="#d8ccc0" opacity="0.5"/>

        <!-- ── 天使兔兔 ── -->
        <!-- 翅膀左 -->
        <path d="M258,95 Q238,80 240,100 Q248,105 262,103" fill="rgba(220,235,250,0.75)" stroke="#a8c0d8" stroke-width="0.8"/>
        <!-- 翅膀右 -->
        <path d="M298,95 Q318,80 316,100 Q308,105 294,103" fill="rgba(220,235,250,0.75)" stroke="#a8c0d8" stroke-width="0.8"/>
        <!-- 身體 -->
        <ellipse cx="278" cy="118" rx="22" ry="16" fill="#f0f5fa" stroke="#c8daea" stroke-width="1.2"/>
        <!-- 頭 -->
        <circle cx="278" cy="96" r="17" fill="#f0f5fa" stroke="#c8daea" stroke-width="1.2"/>
        <!-- 左耳 -->
        <ellipse cx="268" cy="76" rx="5" ry="11" fill="#f0f5fa" stroke="#c8daea" stroke-width="1.2"/>
        <ellipse cx="268" cy="76" rx="2.5" ry="7" fill="#fce0e8"/>
        <!-- 右耳 -->
        <ellipse cx="288" cy="76" rx="5" ry="11" fill="#f0f5fa" stroke="#c8daea" stroke-width="1.2"/>
        <ellipse cx="288" cy="76" rx="2.5" ry="7" fill="#fce0e8"/>
        <!-- 眼睛（閉合彎月） -->
        <path d="M272,94 Q274,91 276,94" fill="none" stroke="#88aacc" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M280,94 Q282,91 284,94" fill="none" stroke="#88aacc" stroke-width="1.5" stroke-linecap="round"/>
        <!-- 臉頰紅暈 -->
        <ellipse cx="270" cy="98" rx="4" ry="2.5" fill="rgba(255,180,190,0.35)"/>
        <ellipse cx="286" cy="98" rx="4" ry="2.5" fill="rgba(255,180,190,0.35)"/>
        <!-- 鼻子 -->
        <ellipse cx="278" cy="99" rx="2" ry="1.2" fill="#f0a0b0"/>
        <!-- 嘴巴（微笑） -->
        <path d="M275,101 Q278,104 281,101" fill="none" stroke="#d080a0" stroke-width="1" stroke-linecap="round"/>
        <!-- 前腳（趴著） -->
        <ellipse cx="262" cy="132" rx="9" ry="5" fill="#f0f5fa" stroke="#c8daea" stroke-width="1"/>
        <ellipse cx="294" cy="132" rx="9" ry="5" fill="#f0f5fa" stroke="#c8daea" stroke-width="1"/>
        <!-- 尾巴 -->
        <circle cx="298" cy="122" r="5" fill="#f5f8fc" stroke="#c8daea" stroke-width="0.8"/>

      </svg>
    </div>
  </div>
</div>

<script>
  // 背景雨滴
  const rainContainer = document.getElementById('rain');
  for (let i = 0; i < 55; i++) {
    const drop = document.createElement('div');
    drop.className = 'raindrop';
    drop.style.left = Math.random() * 100 + '%';
    drop.style.height = (Math.random() * 18 + 10) + 'px';
    drop.style.animationDuration = (Math.random() * 1.2 + 0.7) + 's';
    drop.style.animationDelay = (Math.random() * 2.5) + 's';
    drop.style.opacity = Math.random() * 0.5 + 0.2;
    rainContainer.appendChild(drop);
  }

  // 窗玻璃上的雨滴
  const glassRain = document.getElementById('glass-rain');
  for (let i = 0; i < 14; i++) {
    const drop = document.createElement('div');
    drop.className = 'glass-drop';
    drop.style.left = (Math.random() * 92 + 2) + '%';
    drop.style.height = (Math.random() * 35 + 18) + 'px';
    drop.style.animationDuration = (Math.random() * 3 + 2.5) + 's';
    drop.style.animationDelay = (Math.random() * 4) + 's';
    drop.style.opacity = 0;
    glassRain.appendChild(drop);
  }
</script>
</body>
</html>
